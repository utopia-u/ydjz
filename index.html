<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>记账本 Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="记账本">
    <meta name="theme-color" content="#F2F2F7">
    <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23007AFF' rx='20'/%3E%3Ctext x='50' y='68' font-size='50' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'%3E%E8%B4%A6%3C/text%3E%3C/svg%3E">

    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-text-primary: #000000;
            --ios-text-secondary: #8E8E93;
            --ios-separator: rgba(60, 60, 67, 0.29);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text-primary);
            margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; 
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 500px; margin: 0 auto; padding-bottom: 40px; }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 16px 15px;
        }

        .large-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 0.41px;
            margin: 0;
        }

        .install-btn {
            background-color: rgba(0, 122, 255, 0.1);
            color: var(--ios-blue);
            border: none;
            border-radius: 16px;
            padding: 6px 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: transform 0.1s, opacity 0.2s;
            will-change: transform;
        }
        .install-btn:active { opacity: 0.7; transform: scale(0.96); }
        .install-btn svg { width: 16px; height: 16px; fill: currentColor; }

        /* 预算卡片样式 */
        .budget-card {
            margin: 0 16px 25px;
            padding: 20px;
            background: linear-gradient(135deg, #007AFF, #5AC8FA);
            border-radius: 18px;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25);
            transition: opacity 0.3s ease;
        }
        .budget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            opacity: 0.9;
        }
        .budget-header button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .budget-header button:active { background: rgba(255, 255, 255, 0.4); }
        .budget-header button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .budget-amount {
            font-size: 38px;
            font-weight: 700;
            margin: 12px 0;
            letter-spacing: -0.5px;
        }
        .budget-footer {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            opacity: 0.9;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 10px;
            margin-top: 5px;
        }

        .section-header {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-text-secondary);
            margin: 25px 16px 8px;
        }

        .ios-group {
            background-color: var(--ios-card);
            border-radius: 10px;
            margin: 0 16px;
            overflow: hidden;
            -webkit-overflow-scrolling: touch; 
        }

        .input-row {
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            min-height: 44px;
        }
        .input-row:last-child { border-bottom: none; }
        .input-row label { width: 80px; font-size: 17px; cursor: pointer; }
        .input-row input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 17px;
            padding: 12px 0;
            background: transparent;
            color: var(--ios-text-primary);
            width: 100%;
        }
        .input-row input::placeholder { color: #C7C7CC; }

        .submit-btn {
            display: block;
            width: calc(100% - 32px);
            margin: 20px 16px;
            background-color: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            padding: 14px;
            cursor: pointer;
            transition: opacity 0.2s, background-color 0.2s, transform 0.1s;
        }
        .submit-btn:active { opacity: 0.8; transform: scale(0.98); }
        .submit-btn:disabled { background-color: #A1C9F7; cursor: not-allowed; opacity: 1; transform: scale(1); }

        .list-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            background-color: var(--ios-card);
        }
        .list-row:last-child { border-bottom: none; }
        
        .list-info { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .list-desc { font-size: 17px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } 
        .list-date { font-size: 13px; color: var(--ios-text-secondary); }
        .list-right { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .list-amount { font-size: 17px; font-weight: 500; }
        .text-blue { color: var(--ios-blue); }
        
        .delete-btn {
            color: var(--ios-red);
            background: none;
            border: none;
            font-size: 15px;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--ios-text-secondary);
            font-size: 15px;
        }

        #toast {
            position: fixed; top: 0; left: 50%;
            background-color: rgba(0, 0, 0, 0.8); color: white;
            padding: 12px 24px; border-radius: 20px; font-size: 15px;
            z-index: 9999; transform: translate3d(-50%, -100px, 0); opacity: 0;
            pointer-events: none; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            will-change: transform, opacity;
        }
        #toast.show { transform: translate3d(-50%, 40px, 0); opacity: 1; }

        #installGuide {
            display: flex; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 10000; justify-content: center; align-items: flex-end; padding: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease-out; will-change: opacity;
        }
        #installGuide.show { opacity: 1; pointer-events: auto; }

        .guide-box {
            background: white; border-radius: 20px; padding: 24px; width: 100%; max-width: 400px;
            text-align: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative;
            transform: translate3d(0, 100%, 0); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            will-change: transform;
        }
        #installGuide.show .guide-box { transform: translate3d(0, 0, 0); }
        .guide-box::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translate3d(-50%, 0, 0);
            border-width: 10px 10px 0; border-style: solid; border-color: white transparent transparent transparent;
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div id="installGuide" onclick="document.getElementById('installGuide').classList.remove('show')">
        <div class="guide-box" onclick="event.stopPropagation()">
            <h3 style="margin-top:0;">安装到手机桌面</h3>
            <p style="color:#666; font-size: 15px; line-height: 1.5;">
                1. 点击屏幕底部正中间的 <b>分享图标</b><br>
                <span style="font-size:24px;">⍐</span><br>
                2. 向上滑动菜单，选择 <b>「添加到主屏幕」</b><br>
                3. 点击右上角的 <b>「添加」</b>
            </p>
            <button style="margin-top:10px; padding:10px 20px; border-radius:10px; border:none; background:#eee; font-weight:bold;" onclick="document.getElementById('installGuide').classList.remove('show')">我知道了</button>
        </div>
    </div>

    <div class="container">
        <div class="header-area">
            <h1 class="large-title">记账本</h1>
            <button class="install-btn" id="installBtn" onclick="triggerInstall()">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                装到桌面
            </button>
        </div>

        <div class="budget-card" id="budgetCard" style="opacity: 0;">
            <div class="budget-header">
                <span>本月剩余生活费 (元)</span>
                <button id="setBudgetBtn" onclick="setCloudBudget()">设置预算</button>
            </div>
            <div class="budget-amount" id="ui-budget-remaining">￥0.00</div>
            <div class="budget-footer">
                <span>总预算: <span id="ui-budget-total">0.00</span></span>
                <span>本月已花: <span id="ui-budget-spent">0.00</span></span>
            </div>
        </div>

        <div class="section-header">记一笔</div>
        <form id="expenseForm">
            <div class="ios-group">
                <div class="input-row">
                    <label for="dateInput">日期</label>
                    <input type="date" id="dateInput" required>
                </div>
                <div class="input-row">
                    <label for="amountInput">金额</label>
                    <input type="number" id="amountInput" placeholder="0.00" step="0.01" min="0.01" required>
                </div>
                <div class="input-row">
                    <label for="descInput">备注</label>
                    <input type="text" id="descInput" placeholder="例如：午餐、交通" maxlength="50" required>
                </div>
            </div>
            <button type="submit" id="submitBtn" class="submit-btn">保存记录</button>
        </form>

        <div class="section-header">月度统计</div>
        <div class="ios-group" id="monthlyList">
            <div class="empty-state">同步中...</div>
        </div>

        <div class="section-header">历史记录</div>
        <div class="ios-group" id="historyList">
            <div class="empty-state">正在建立云端连接...</div>
        </div>
    </div>

    <script type="module">
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        if (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) {
            document.getElementById('installBtn').style.display = 'none';
        }

        window.triggerInstall = async () => {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            if (isIOS) {
                document.getElementById('installGuide').classList.add('show');
            } else if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('installBtn').style.display = 'none';
                }
                deferredPrompt = null;
            } else {
                showToast("请点击浏览器菜单中的「添加到主屏幕」");
            }
        };

        const SUPABASE_URL = 'https://htqjfniugsahibhkjszb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0cWpmbml1Z3NhaGliaGtqc3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDI2NDksImV4cCI6MjA4OTIxODY0OX0.pmMUaaLLZ-RWFt_bkFPFiSLmdM4LKbG6SI-q2TEe-j8';
        
        let supabase = null;
        let localData = []; 
        let globalBudget = 0; // 全局变量：存储云端的预算

        // =========================================
        // 核心更新：向云端写入生活费预算
        // =========================================
        window.setCloudBudget = async function() {
            const input = prompt('请输入每月的总生活费预算 (元) :', globalBudget || '');
            if (input !== null) {
                const val = parseFloat(input);
                if (!isNaN(val) && val >= 0) {
                    
                    document.getElementById('setBudgetBtn').disabled = true;
                    showToast('云端同步中...');
                    
                    // 利用 upsert 将预算更新到 settings 表（固定 id 为 1）
                    const { error } = await supabase.from('settings').upsert({ id: 1, monthly_budget: val });
                    
                    if (error) {
                        showToast('同步失败: ' + error.message);
                    } else {
                        // 因为开启了 Realtime，修改完毕后会自动触发界面的更新
                        showToast('预算已更新至云端');
                    }
                    document.getElementById('setBudgetBtn').disabled = false;
                } else {
                    showToast('请输入正确的数字金额');
                }
            }
        };

        async function loadEngine() {
            const urls = [
                'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm',
                'https://esm.sh/@supabase/supabase-js@2'
            ];
            for (const url of urls) {
                try {
                    const mod = await import(url);
                    return mod.createClient;
                } catch (e) { console.warn("跳过"); }
            }
            throw new Error("网络受限");
        }

        // =========================================
        // 核心更新：同时监听记账表和设置表的实时变动
        // =========================================
        function subscribeToChanges() {
            supabase
                .channel('realtime-db')
                // 监听 expenses (记账) 的任何变化
                .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, (payload) => {
                    fetchCloudData(); // 重新拉取
                })
                // 监听 settings (预算) 的任何变化
                .on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, (payload) => {
                    fetchCloudData(); // 重新拉取
                })
                .subscribe();
        }

        async function bootstrap() {
            initDateUI();
            try {
                const createClient = await loadEngine();
                supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
                await fetchCloudData();
                subscribeToChanges();
            } catch (err) {
                document.getElementById('historyList').innerHTML = `<div class="empty-state" style="color:red;">连接失败: ${err.message}</div>`;
            }
        }
        bootstrap();

        // =========================================
        // 核心更新：同时拉取流水数据和预算设置
        // =========================================
        async function fetchCloudData() {
            // 并发请求：同时拉取开销表和设置表，提高速度
            const [expensesRes, settingsRes] = await Promise.all([
                supabase.from('expenses').select('*').order('date', { ascending: false }).order('id', { ascending: false }),
                supabase.from('settings').select('monthly_budget').eq('id', 1).single()
            ]);

            if (!expensesRes.error) {
                localData = expensesRes.data || [];
            }
            
            // 如果成功读到了设置
            if (!settingsRes.error && settingsRes.data) {
                globalBudget = parseFloat(settingsRes.data.monthly_budget) || 0;
            }

            renderUI();
        }

        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const date = document.getElementById('dateInput').value;
            const amount = parseFloat(document.getElementById('amountInput').value);
            const desc = document.getElementById('descInput').value.trim();

            btn.disabled = true;
            btn.innerText = '发送中...';

            const { error } = await supabase.from('expenses').insert([{ date, amount, desc }]);
            
            if (!error) {
                showToast('保存成功');
                document.getElementById('amountInput').value = '';
                document.getElementById('descInput').value = '';
            } else {
                showToast('错误: ' + error.message);
            }
            btn.disabled = false;
            btn.innerText = '保存记录';
        });

        window.deleteItem = async (id) => {
            if (!confirm('确定删除？')) return;
            showToast('处理中...');
            await supabase.from('expenses').delete().eq('id', id);
        };

        function renderUI() {
            const historyList = document.getElementById('historyList');
            const monthlyList = document.getElementById('monthlyList');
            historyList.innerHTML = '';
            monthlyList.innerHTML = '';

            const months = {};
            
            localData.forEach(item => {
                const val = Number(item.amount) || 0;
                const row = document.createElement('div');
                row.className = 'list-row';
                row.innerHTML = `
                    <div class="list-info">
                        <span class="list-desc">${escapeHTML(item.desc)}</span>
                        <span class="list-date">${escapeHTML(item.date)}</span>
                    </div>
                    <div class="list-right">
                        <span class="list-amount">￥${val.toFixed(2)}</span>
                        <button class="delete-btn" onclick="deleteItem('${item.id}')">删除</button>
                    </div>`;
                historyList.appendChild(row);
                
                const m = item.date.substring(0, 7);
                months[m] = (months[m] || 0) + val;
            });

            if (localData.length === 0) {
                historyList.innerHTML = '<div class="empty-state">暂无数据</div>';
                monthlyList.innerHTML = '<div class="empty-state">暂无数据</div>';
            } else {
                Object.keys(months).sort().reverse().forEach(m => {
                    const row = document.createElement('div');
                    row.className = 'list-row';
                    row.innerHTML = `<span class="list-desc" style="font-weight:500;">${m}</span><span class="list-amount text-blue">￥${months[m].toFixed(2)}</span>`;
                    monthlyList.appendChild(row);
                });
            }

            // =========================================
            // 使用云端变量渲染预算面板
            // =========================================
            const today = new Date();
            const currentMonthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
            
            const currentMonthSpent = months[currentMonthStr] || 0;
            const remaining = globalBudget - currentMonthSpent;

            document.getElementById('ui-budget-total').innerText = globalBudget.toFixed(2);
            document.getElementById('ui-budget-spent').innerText = currentMonthSpent.toFixed(2);
            
            const remainingEl = document.getElementById('ui-budget-remaining');
            if (remaining < 0) {
                remainingEl.innerText = `-￥${Math.abs(remaining).toFixed(2)}`;
                remainingEl.style.color = '#FFE5E5'; 
            } else {
                remainingEl.innerText = `￥${remaining.toFixed(2)}`;
                remainingEl.style.color = 'white';
            }

            // 展示数据面板
            document.getElementById('budgetCard').style.opacity = '1';
        }

        function initDateUI() {
            const d = new Date();
            document.getElementById('dateInput').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function escapeHTML(s) {
            return String(s).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":"&#39;",'"':"&quot;"}[c]));
        }
    </script>
</body>
</html>
