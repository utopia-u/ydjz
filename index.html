<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>记账本</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-text-primary: #000000;
            --ios-text-secondary: #8E8E93;
            --ios-separator: rgba(60, 60, 67, 0.29);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text-primary);
            margin: 0;
            padding: 0 0 50px 0; 
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 500px; margin: 0 auto; padding-bottom: 40px; }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 16px 15px;
        }

        .large-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 0.41px;
            margin: 0;
        }

        .budget-card {
            margin: 0 16px 25px;
            padding: 20px;
            background: linear-gradient(135deg, #007AFF, #5AC8FA);
            border-radius: 18px;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.25);
        }
        .budget-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            opacity: 0.9;
        }
        .budget-header button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 500;
        }
        .budget-amount {
            font-size: 38px;
            font-weight: 700;
            margin: 12px 0;
            letter-spacing: -0.5px;
        }
        .budget-footer {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            opacity: 0.9;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 10px;
            margin-top: 5px;
        }

        .section-header {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-text-secondary);
            margin: 25px 16px 8px;
        }

        .ios-group {
            background-color: var(--ios-card);
            border-radius: 10px;
            margin: 0 16px;
            overflow: hidden;
        }

        .input-row {
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            min-height: 44px;
        }
        .input-row:last-child { border-bottom: none; }
        .input-row label { width: 80px; font-size: 17px; }
        .input-row input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 17px;
            padding: 12px 0;
            background: transparent;
            color: var(--ios-text-primary);
            width: 100%;
        }
        .input-row input::placeholder { color: #C7C7CC; }

        .submit-btn {
            display: block;
            width: calc(100% - 32px);
            margin: 20px 16px;
            background-color: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            padding: 14px;
            cursor: pointer;
        }
        .submit-btn:active { opacity: 0.7; }
        .submit-btn:disabled { background-color: #A1C9F7; cursor: not-allowed; }

        .list-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            background-color: var(--ios-card);
        }
        .list-row:last-child { border-bottom: none; }
        
        .list-info { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
        .list-desc { font-size: 17px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; } 
        .list-date { font-size: 13px; color: var(--ios-text-secondary); }
        .list-right { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .list-amount { font-size: 17px; font-weight: 500; }
        .text-blue { color: var(--ios-blue); }
        
        .delete-btn {
            color: var(--ios-red);
            background: none;
            border: none;
            font-size: 15px;
            padding: 6px 10px;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--ios-text-secondary);
            font-size: 15px;
            line-height: 1.5;
        }

        #status-toast {
            text-align: center;
            font-size: 13px;
            height: 18px;
            margin-top: 10px;
            color: var(--ios-text-secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status-toast"></div>
        <div class="header-area">
            <h1 class="large-title">记账本</h1>
        </div>

        <div class="budget-card">
            <div class="budget-header">
                <span id="ui-budget-title">本月剩余生活费 (元)</span>
                <button onclick="setCloudBudget()">设置预算</button>
            </div>
            <div class="budget-amount" id="ui-budget-remaining">￥0.00</div>
            <div class="budget-footer">
                <span>总预算: <span id="ui-budget-total">0.00</span></span>
                <span>本月已花: <span id="ui-budget-spent">0.00</span></span>
            </div>
        </div>

        <div class="section-header">记一笔</div>
        <div class="ios-group">
            <div class="input-row">
                <label>日期</label>
                <input type="date" id="dateInput">
            </div>
            <div class="input-row">
                <label>金额</label>
                <input type="number" id="amountInput" placeholder="0.00" step="0.01" min="0.01">
            </div>
            <div class="input-row">
                <label>备注</label>
                <input type="text" id="descInput" placeholder="例如：午餐、交通">
            </div>
        </div>
        <button id="submitBtn" class="submit-btn" onclick="addRecord()">保存记录</button>

        <div class="section-header">月度统计</div>
        <div class="ios-group" id="monthlyList">
            <div class="empty-state">同步中...</div>
        </div>

        <div class="section-header">历史记录</div>
        <div class="ios-group" id="historyList">
            <div class="empty-state">同步中...</div>
        </div>
    </div>

    <script>
        // 捕捉未处理的 Promise 异常 (专门针对网络超时)
        window.addEventListener('unhandledrejection', function(event) {
            document.getElementById('status-toast').innerText = "网络异常: " + event.reason.message;
            document.getElementById('status-toast').style.color = "red";
        });

        window.onerror = function(msg) {
            document.getElementById('status-toast').innerText = "代码错误: " + msg;
            document.getElementById('status-toast').style.color = "red";
        };

        const SUPABASE_URL = 'https://htqjfniugsahibhkjszb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0cWpmbml1Z3NhaGliaGtqc3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDI2NDksImV4cCI6MjA4OTIxODY0OX0.pmMUaaLLZ-RWFt_bkFPFiSLmdM4LKbG6SI-q2TEe-j8';
        
        let supabase = null;
        let localData = []; 
        let monthlyBudgets = {}; 

        function initDateUI() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            document.getElementById('dateInput').value = `${year}-${month}-${day}`;
        }

        window.onload = function() {
            initDateUI();
            if (typeof window.supabase === 'undefined') {
                document.getElementById('status-toast').innerText = "核心组件加载失败";
                document.getElementById('status-toast').style.color = "red";
                document.getElementById('historyList').innerHTML = '<div class="empty-state" style="color:var(--ios-red);">组件加载失败，请刷新</div>';
                document.getElementById('monthlyList').innerHTML = '<div class="empty-state">连接断开</div>';
                return;
            }
            
            // 【核心修复1】关闭持久化会话，防止微信 WebView 读取 LocalStorage 导致应用崩溃
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                auth: { persistSession: false } 
            });
            
            fetchCloudData();
        };

        function showStatus(msg) {
            const el = document.getElementById('status-toast');
            el.innerText = msg;
            el.style.color = "#8E8E93";
            setTimeout(() => { el.innerText = ""; }, 2500);
        }

        function getCurrentMonthStr() {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
        }

        // 【核心修复2】带超时控制的拉取函数，解决网络静默挂起的问题
        async function fetchCloudData() {
            showStatus('正在同步...');
            document.getElementById('historyList').innerHTML = '<div class="empty-state">同步中...</div>';
            
            try {
                // 设置一个 8 秒的定时炸弹
                const timeoutPromise = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error("请求超时，网络可能被拦截")), 8000);
                });

                // 发起真实的数据请求
                const fetchPromise = Promise.all([
                    supabase.from('expenses').select('*').order('date', { ascending: false }).order('id', { ascending: false }),
                    supabase.from('budgets').select('*')
                ]);

                // 让真实请求和定时炸弹赛跑
                const [expensesRes, budgetsRes] = await Promise.race([fetchPromise, timeoutPromise]);

                // 处理 API 抛出的错误信息
                if (expensesRes.error) throw new Error(expensesRes.error.message);
                if (budgetsRes.error) throw new Error(budgetsRes.error.message);

                localData = expensesRes.data || [];
                monthlyBudgets = {};
                if (budgetsRes.data) {
                    budgetsRes.data.forEach(item => {
                        monthlyBudgets[item.month] = parseFloat(item.amount) || 0;
                    });
                }
                renderUI();
                showStatus('同步完成');

            } catch (err) {
                // 如果出现任何错误（包括上面的8秒超时），立刻把白框里的内容替换掉，绝不卡死
                document.getElementById('status-toast').innerText = "拉取失败";
                document.getElementById('status-toast').style.color = "var(--ios-red)";
                
                document.getElementById('historyList').innerHTML = `<div class="empty-state" style="color:var(--ios-red);">拉取数据失败<br><span style="font-size:12px;color:#888;">${err.message}</span></div>`;
                document.getElementById('monthlyList').innerHTML = `<div class="empty-state">连接失败</div>`;
            }
        }

        async function setCloudBudget() {
            if (!supabase) return;
            const currentMonthStr = getCurrentMonthStr();
            const currentBudget = monthlyBudgets[currentMonthStr] || '';
            const input = prompt(`请输入本月 (${currentMonthStr}) 的总生活费预算 (元) :`, currentBudget);
            
            if (input !== null) {
                const val = parseFloat(input);
                if (!isNaN(val) && val >= 0) {
                    showStatus('保存预算中...');
                    try {
                        const { error } = await supabase.from('budgets').upsert({ month: currentMonthStr, amount: val });
                        if (error) throw error;
                        fetchCloudData();
                    } catch (err) {
                        alert('同步失败: ' + err.message);
                    }
                } else {
                    alert('请输入正确的数字金额');
                }
            }
        }

        async function addRecord() {
            if (!supabase) return;
            const btn = document.getElementById('submitBtn');
            const date = document.getElementById('dateInput').value;
            const amount = parseFloat(document.getElementById('amountInput').value);
            const desc = document.getElementById('descInput').value.trim();

            if (!date || isNaN(amount) || amount <= 0 || !desc) {
                alert("请填写完整的日期、金额和备注");
                return;
            }

            btn.disabled = true;
            btn.innerText = '发送中...';

            try {
                const { error } = await supabase.from('expenses').insert([{ date, amount, desc }]);
                if (error) throw error;
                
                document.getElementById('amountInput').value = '';
                document.getElementById('descInput').value = '';
                await fetchCloudData();
            } catch (err) {
                alert('保存错误: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = '保存记录';
            }
        }

        async function deleteItem(id) {
            if (!confirm('确定删除？')) return;
            showStatus('删除中...');
            try {
                const { error } = await supabase.from('expenses').delete().eq('id', id);
                if (error) throw error;
                await fetchCloudData();
            } catch (err) {
                alert('删除失败');
            }
        }

        function renderUI() {
            const historyList = document.getElementById('historyList');
            const monthlyList = document.getElementById('monthlyList');
            historyList.innerHTML = '';
            monthlyList.innerHTML = '';

            const months = {};
            
            localData.forEach(item => {
                const val = Number(item.amount) || 0;
                const safeDesc = String(item.desc).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":"&#39;",'"':"&quot;"}[c]));
                const row = document.createElement('div');
                row.className = 'list-row';
                row.innerHTML = `
                    <div class="list-info">
                        <span class="list-desc">${safeDesc}</span>
                        <span class="list-date">${item.date}</span>
                    </div>
                    <div class="list-right">
                        <span class="list-amount">￥${val.toFixed(2)}</span>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">删除</button>
                    </div>`;
                historyList.appendChild(row);
                
                const m = item.date.substring(0, 7);
                months[m] = (months[m] || 0) + val;
            });

            if (localData.length === 0) {
                historyList.innerHTML = '<div class="empty-state">暂无数据</div>';
                monthlyList.innerHTML = '<div class="empty-state">暂无数据</div>';
            } else {
                Object.keys(months).sort().reverse().forEach(m => {
                    const row = document.createElement('div');
                    row.className = 'list-row';
                    row.innerHTML = `<span class="list-desc" style="font-weight:500;">${m}</span><span class="list-amount text-blue">￥${months[m].toFixed(2)}</span>`;
                    monthlyList.appendChild(row);
                });
            }

            const currentMonthStr = getCurrentMonthStr();
            const thisMonthBudget = monthlyBudgets[currentMonthStr] || 0;
            const currentMonthSpent = months[currentMonthStr] || 0;
            const remaining = thisMonthBudget - currentMonthSpent;

            document.getElementById('ui-budget-title').innerText = `${currentMonthStr.split('-')[1]}月份剩余生活费 (元)`;
            document.getElementById('ui-budget-total').innerText = thisMonthBudget.toFixed(2);
            document.getElementById('ui-budget-spent').innerText = currentMonthSpent.toFixed(2);
            
            const remainingEl = document.getElementById('ui-budget-remaining');
            if (remaining < 0) {
                remainingEl.innerText = `-￥${Math.abs(remaining).toFixed(2)}`;
                remainingEl.style.color = '#FFE5E5'; 
            } else {
                remainingEl.innerText = `￥${remaining.toFixed(2)}`;
                remainingEl.style.color = 'white';
            }
        }
    </script>
</body>
</html>
