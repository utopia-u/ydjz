<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记账</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* iOS 颜色变量 */
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-red: #FF3B30;
            --ios-text-primary: #000000;
            --ios-text-secondary: #8E8E93;
            --ios-separator: rgba(60, 60, 67, 0.29);
        }

        body {
            /* 调用苹果原生字体 */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text-primary);
            margin: 0;
            padding: 0;
            padding-bottom: 40px; /* 底部留白，防遮挡 */
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* iOS 大标题 */
        .large-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 0.41px;
            margin: 30px 16px 10px;
        }

        /* 顶部状态栏提示 */
        #status {
            text-align: center;
            font-size: 13px;
            color: var(--ios-text-secondary);
            height: 18px;
            margin-top: 10px;
        }

        /* 分组标题 */
        .section-header {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--ios-text-secondary);
            margin: 25px 16px 8px;
            letter-spacing: -0.08px;
        }

        /* iOS 卡片/列表组 */
        .ios-group {
            background-color: var(--ios-card);
            border-radius: 10px;
            margin: 0 16px;
            overflow: hidden;
        }

        /* 表单输入区 */
        .input-row {
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            min-height: 44px;
        }
        .input-row:last-child {
            border-bottom: none;
        }
        .input-row label {
            width: 80px;
            font-size: 17px;
        }
        .input-row input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 17px;
            padding: 12px 0;
            background: transparent;
            color: var(--ios-text-primary);
        }
        .input-row input::placeholder {
            color: #C7C7CC;
        }

        /* 主按钮 */
        .submit-btn {
            display: block;
            width: calc(100% - 32px);
            margin: 20px 16px;
            background-color: var(--ios-blue);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            padding: 14px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .submit-btn:active { opacity: 0.7; }
        .submit-btn:disabled { background-color: #A1C9F7; cursor: not-allowed; }

        /* 列表项 */
        .list-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 0.5px solid var(--ios-separator);
            background-color: var(--ios-card);
        }
        .list-row:last-child { border-bottom: none; }
        
        .list-info { display: flex; flex-direction: column; gap: 4px; }
        .list-desc { font-size: 17px; font-weight: 400; }
        .list-date { font-size: 13px; color: var(--ios-text-secondary); }
        
        .list-right { display: flex; align-items: center; gap: 15px; }
        .list-amount { font-size: 17px; font-weight: 500; }
        
        /* 统计数字颜色 */
        .text-blue { color: var(--ios-blue); }
        
        /* iOS 文字按钮 (删除) */
        .delete-btn {
            color: var(--ios-red);
            background: none;
            border: none;
            font-size: 15px;
            padding: 4px 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .delete-btn:active { opacity: 0.5; }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: var(--ios-text-secondary);
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="status"></div>
        <h1 class="large-title">记账本</h1>

        <div class="section-header">记一笔</div>
        <div class="ios-group">
            <div class="input-row">
                <label>日期</label>
                <input type="date" id="dateInput">
            </div>
            <div class="input-row">
                <label>金额</label>
                <input type="number" id="amountInput" placeholder="0.00" step="0.01">
            </div>
            <div class="input-row">
                <label>备注</label>
                <input type="text" id="descInput" placeholder="例如：午餐、交通">
            </div>
        </div>
        <button id="addBtn" class="submit-btn" onclick="addRecord()">保存</button>

        <div class="section-header">月度统计</div>
        <div class="ios-group" id="monthlyList">
            </div>

        <div class="section-header">历史记录</div>
        <div class="ios-group" id="historyList">
            </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://htqjfniugsahibhkjszb.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh0cWpmbml1Z3NhaGliaGtqc3piIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NDI2NDksImV4cCI6MjA4OTIxODY0OX0.pmMUaaLLZ-RWFt_bkFPFiSLmdM4LKbG6SI-q2TEe-j8';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let localData = []; 

        window.onload = () => {
            document.getElementById('dateInput').valueAsDate = new Date();
            loadData(); 
        };

        function setStatus(msg) {
            document.getElementById('status').innerText = msg;
            if(msg) {
                setTimeout(() => { document.getElementById('status').innerText = ''; }, 3000);
            }
        }

        async function loadData() {
            setStatus('正在同步云端数据...');
            const { data, error } = await supabase
                .from('expenses')
                .select('*')
                .order('date', { ascending: false })
                .order('id', { ascending: false });

            if (error) {
                console.error(error);
                setStatus('网络连接失败');
                return;
            }
            
            localData = data || []; 
            render(localData);
            setStatus(''); // 加载完毕清空提示
        }

        async function addRecord() {
            const date = document.getElementById('dateInput').value;
            const amount = parseFloat(document.getElementById('amountInput').value);
            const desc = document.getElementById('descInput').value || '日常支出';

            if (!date || !amount) {
                alert('请填写金额');
                return;
            }

            document.getElementById('addBtn').disabled = true;
            setStatus('保存中...');

            const { data, error } = await supabase
                .from('expenses')
                .insert([{ date, amount, desc }])
                .select(); 

            document.getElementById('addBtn').disabled = false;

            if (error) {
                alert('保存失败：' + error.message);
                setStatus('');
            } else if (data && data.length > 0) {
                document.getElementById('amountInput').value = '';
                document.getElementById('descInput').value = '';
                
                localData.unshift(data[0]); 
                localData.sort((a, b) => new Date(b.date) - new Date(a.date) || b.id - a.id);
                
                render(localData);
                setStatus('已保存');
            }
        }

        async function deleteItem(id) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            setStatus('删除中...');
            const { error } = await supabase.from('expenses').delete().eq('id', id);
            
            if (error) {
                alert('删除失败');
                setStatus('');
            } else {
                localData = localData.filter(item => item.id !== id);
                render(localData);
                setStatus('已删除');
            }
        }

        function render(data) {
            const historyList = document.getElementById('historyList');
            const monthlyList = document.getElementById('monthlyList');
            historyList.innerHTML = '';
            monthlyList.innerHTML = '';

            if (data.length === 0) {
                historyList.innerHTML = '<div class="empty-state">暂无记录</div>';
                monthlyList.innerHTML = '<div class="empty-state">暂无数据</div>';
                return;
            }

            const months = {};

            // 渲染明细
            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'list-row';
                div.innerHTML = `
                    <div class="list-info">
                        <span class="list-desc">${item.desc}</span>
                        <span class="list-date">${item.date}</span>
                    </div>
                    <div class="list-right">
                        <span class="list-amount">￥${item.amount.toFixed(2)}</span>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">删除</button>
                    </div>
                `;
                historyList.appendChild(div);

                const m = item.date.substring(0, 7);
                months[m] = (months[m] || 0) + item.amount;
            });

            // 渲染汇总
            Object.keys(months).sort().reverse().forEach(m => {
                const div = document.createElement('div');
                div.className = 'list-row';
                div.innerHTML = `
                    <span class="list-desc" style="font-weight:500;">${m}</span>
                    <span class="list-amount text-blue">￥${months[m].toFixed(2)}</span>
                `;
                monthlyList.appendChild(div);
            });
        }
    </script>
</body>
</html>
